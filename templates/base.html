<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Football Explorer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/cyborg/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark"
      style="background-color: #111111; border-bottom: 1px solid #333"
    >
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
          ⚽ FotExplorer
        </a>

        <div class="navbar-search-container mx-auto">
          <span class="navbar-search-icon">🔍</span>
          <input
            type="text"
            id="live-search-input"
            class="navbar-search-input"
            placeholder="Search for teams..."
            autocomplete="off"
          />

          <div id="search-dropdown" class="search-results-dropdown"></div>
        </div>

        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('index') }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('dashboard') }}"
                >Dashboard</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4">{% block content %} {% endblock %}</div>

    <script>
      const searchInput = document.getElementById("live-search-input");
      const dropdown = document.getElementById("search-dropdown");

      searchInput.addEventListener("input", function () {
        const query = this.value.trim();

        if (query.length < 3) {
          dropdown.style.display = "none";
          return;
        }

        fetch(`/api/search?q=${query}`)
          .then((response) => response.json())
          .then((data) => {
            dropdown.innerHTML = ""; // Clear previous results

            if (data.length > 0) {
              data.forEach((team) => {
                const link = document.createElement("a");
                link.href = `/stadiums?team_name=${encodeURIComponent(team.name)}`;
                link.className = "search-result-item";
                link.innerHTML = `
                                <img src="${team.badge}" class="search-result-badge" alt="badge">
                                <div>
                                    <div class="fw-bold">${team.name}</div>
                                    <div style="font-size: 0.8rem; color: #888;">${team.stadium}</div>
                                </div>
                            `;
                dropdown.appendChild(link);
              });
              dropdown.style.display = "block";
            } else {
              dropdown.style.display = "none";
            }
          })
          .catch((err) => console.error(err));
      });

      // Hide dropdown when clicking outside
      document.addEventListener("click", function (e) {
        if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
          dropdown.style.display = "none";
        }
      });
    </script>
  </body>
</html>
